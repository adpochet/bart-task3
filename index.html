<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BART responsive</title>

  <script src="https://unpkg.com/jspsych@8.2.3"></script>
  <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css" />

  <script src="https://unpkg.com/@jspsych/plugin-instructions@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych-contrib/plugin-bart"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #f8f8f8;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    .jspsych-display-element {
      width: 100%;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .jspsych-content-wrapper {
      width: 100%;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .jspsych-content {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      box-sizing: border-box;
    }

    .jspsych-btn {
      border-radius: 8px;
    }

    /* =========================
       MODE INSTRUCTIONS
       ========================= */
    body.instructions-mode .jspsych-content-wrapper,
    body.end-mode .jspsych-content-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    body.instructions-mode .jspsych-content,
    body.end-mode .jspsych-content {
      max-width: 900px;
      padding: 24px 20px;
      text-align: center;
    }

    body.instructions-mode h2,
    body.end-mode h2 {
      font-size: 28px;
      line-height: 1.2;
      margin: 0 0 18px 0;
    }

    body.instructions-mode p,
    body.instructions-mode li,
    body.end-mode p {
      font-size: 18px;
      line-height: 1.5;
    }

    body.instructions-mode ul {
      text-align: left;
      display: inline-block;
      padding-left: 24px;
      margin: 10px 0 16px 0;
    }

    body.instructions-mode .jspsych-btn,
    body.end-mode .jspsych-btn {
      font-size: 18px !important;
      padding: 12px 22px !important;
      margin: 8px !important;
      white-space: normal;
    }

    /* =========================
       MODE BART
       ========================= */
    body.bart-mode .jspsych-content-wrapper {
      display: block;
    }

    body.bart-mode .jspsych-content {
      max-width: 760px;
      padding: 4px 8px 8px 8px;
    }

    body.bart-mode .jspsych-btn {
      font-size: 16px !important;
      padding: 10px 16px !important;
      margin: 5px !important;
      white-space: normal;
    }

    /* on réduit les marges générales pendant la BART */
    body.bart-mode p,
    body.bart-mode h2,
    body.bart-mode h3,
    body.bart-mode div {
      margin-top: 0;
    }

    /* on essaie de compacter l’affichage du ballon */
    body.bart-mode svg {
      display: block;
      margin: 0 auto !important;
      max-width: 100% !important;
      height: auto !important;
      max-height: 34vh !important;
    }

    /* compacter les blocs d’infos/score */
    body.bart-mode .jspsych-content > div {
      margin-top: 6px !important;
      margin-bottom: 6px !important;
    }

    /* =========================
       TABLETTE
       ========================= */
    @media (max-width: 768px) {
      body.instructions-mode .jspsych-content,
      body.end-mode .jspsych-content {
        padding: 18px 14px;
      }

      body.instructions-mode h2,
      body.end-mode h2 {
        font-size: 24px;
      }

      body.instructions-mode p,
      body.instructions-mode li,
      body.end-mode p {
        font-size: 16px;
        line-height: 1.4;
      }

      body.instructions-mode .jspsych-btn,
      body.end-mode .jspsych-btn {
        font-size: 17px !important;
        padding: 12px 18px !important;
      }

      body.bart-mode .jspsych-content {
        max-width: 100%;
        padding: 4px 8px 8px 8px;
      }

      body.bart-mode .jspsych-btn {
        font-size: 16px !important;
        padding: 10px 12px !important;
      }

      body.bart-mode svg {
        max-height: 30vh !important;
      }
    }

    /* =========================
       TELEPHONE
       ========================= */
    @media (max-width: 480px) {
      body.instructions-mode .jspsych-content,
      body.end-mode .jspsych-content {
        padding: 14px 10px;
      }

      body.instructions-mode h2,
      body.end-mode h2 {
        font-size: 21px;
      }

      body.instructions-mode p,
      body.instructions-mode li,
      body.end-mode p {
        font-size: 15px;
        line-height: 1.35;
      }

      body.instructions-mode .jspsych-btn,
      body.end-mode .jspsych-btn {
        width: 100% !important;
        font-size: 16px !important;
        padding: 12px !important;
        margin: 6px 0 !important;
      }

      body.bart-mode .jspsych-content {
        max-width: 100%;
        padding: 2px 6px 6px 6px;
      }

      body.bart-mode .jspsych-btn {
        width: 100% !important;
        font-size: 15px !important;
        padding: 10px !important;
        margin: 4px 0 !important;
      }

      body.bart-mode svg {
        max-height: 26vh !important;
      }
    }
  </style>
</head>
<body class="instructions-mode"></body>

<script>
  const jsPsych = initJsPsych({});
  const timeline = [];

  function setPageMode(mode) {
    document.body.classList.remove("instructions-mode", "bart-mode", "end-mode");
    document.body.classList.add(mode);
  }

  const screenWidth = window.innerWidth;
  const screenHeight = window.innerHeight;

  let startSize = 0.4;
  let sizeIncrement = 0.05;
  let maxWidth = "900px";

  if (screenWidth <= 480) {
    startSize = 0.17;
    sizeIncrement = 0.022;
    maxWidth = "100%";
  } else if (screenWidth <= 768) {
    startSize = 0.22;
    sizeIncrement = 0.028;
    maxWidth = "100%";
  } else if (screenWidth <= 1024) {
    startSize = 0.28;
    sizeIncrement = 0.035;
    maxWidth = "95%";
  }

  if (screenHeight < 800) {
    startSize = Math.max(0.16, startSize - 0.03);
    sizeIncrement = Math.max(0.02, sizeIncrement - 0.005);
  }

  document.addEventListener("DOMContentLoaded", function() {
    const content = document.querySelector(".jspsych-content");
    if (content) {
      content.style.maxWidth = maxWidth;
    }
  });

  const instructions = {
    type: jsPsychInstructions,
    pages: [
      `
      <h2>Tâche des ballons</h2>
      <p>Dans cette tâche, tu verras plusieurs ballons.</p>
      <p>À chaque ballon, tu peux :</p>
      <ul>
        <li><strong>Gonfler</strong> : gonfler le ballon et gagner des points</li>
        <li><strong>Encaisser</strong> : sécuriser les points du ballon actuel</li>
      </ul>
      <p>Attention : si le ballon éclate, tu perds les points de ce ballon.</p>
      <p>Essaie de gagner le plus de points possible.</p>
      `,
      `
      <p>Le risque d’explosion n’est pas visible.</p>
      <p>Chaque ballon peut éclater à un moment différent.</p>
      <p>Clique sur <strong>Suivant</strong> pour commencer.</p>
      `
    ],
    show_clickable_nav: true,
    button_label_next: "Suivant",
    button_label_previous: "Retour",
    on_load: function() {
      setPageMode("instructions-mode");
    }
  };

  timeline.push(instructions);

  const N_BALLOONS = 10;
  let totalPoints = 0;

  function generatePopThreshold() {
    return Math.floor(Math.random() * 64) + 1;
  }

  for (let i = 0; i < N_BALLOONS; i++) {
    timeline.push({
      type: jsPsychBart,
      pop_threshold: generatePopThreshold(),
      starting_total_points: function() {
        return totalPoints;
      },
      points_per_pump: 1,
      balloon_color: "#e74c3c",
      balloon_starting_size: startSize,
      balloon_size_increment: sizeIncrement,
      show_balloon_value: true,
      show_total_points: true,
      pump_button_label: "Gonfler",
      collect_button_label: "Encaisser",
      data: {
        task: "bart",
        balloon_number: i + 1,
        screen_width: window.innerWidth,
        screen_height: window.innerHeight,
        user_agent: navigator.userAgent
      },
      on_load: function() {
        setPageMode("bart-mode");
      },
      on_finish: function(data) {
        totalPoints = data.total_points;
      }
    });
  }

  const end_screen = {
    type: jsPsychHtmlButtonResponse,
    stimulus: function() {
      const data = jsPsych.data.get().filter({ task: "bart" }).values();

      let totalPumps = 0;
      let explosions = 0;

      data.forEach(d => {
        totalPumps += d.pumps;
        if (d.popped) explosions++;
      });

      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
        ? "mobile"
        : "ordinateur";

      end_screen.results = {
        type: "bartComplete",
        pumps: totalPumps,
        explosions: explosions,
        score: totalPoints,
        device: isMobile,
        screenwidth: window.innerWidth
      };

      return "<h2>Fin de la tâche</h2>" +
             "<p>Score final : <strong>" + totalPoints + "</strong></p>" +
             "<p>Clique sur le bouton ci-dessous pour continuer.</p>";
    },
    choices: ["Continuer"],
    on_load: function() {
      setPageMode("end-mode");
    },
    on_finish: function() {
      window.parent.postMessage(end_screen.results, "*");
    }
  };

  timeline.push(end_screen);

  jsPsych.run(timeline);
</script>
</html>
