<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BART responsive compacte</title>

  <script src="https://unpkg.com/jspsych@8.2.3"></script>
  <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css" />

  <script src="https://unpkg.com/@jspsych/plugin-instructions@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych-contrib/plugin-bart"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f8f8f8;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: Arial, sans-serif;
    }

    .jspsych-display-element {
      width: 100%;
      min-height: 100vh;
      box-sizing: border-box;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .jspsych-content-wrapper {
      width: 100%;
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
    }

    .jspsych-content {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 8px 12px 12px 12px;
      box-sizing: border-box;
    }

    .jspsych-btn {
      font-size: 16px !important;
      padding: 10px 16px !important;
      margin: 6px !important;
      border-radius: 8px;
      max-width: 100%;
      white-space: normal;
    }

    h2 {
      font-size: 24px;
      line-height: 1.2;
      margin: 0 0 10px 0;
    }

    p, li {
      font-size: 16px;
      line-height: 1.35;
      margin: 8px 0;
    }

    ul {
      text-align: left;
      display: inline-block;
      padding-left: 20px;
      margin: 8px 0;
    }

    /* Réduire un peu les gros blocs de score et les espacements internes du plugin */
    .jspsych-bart-container,
    .jspsych-bart-display {
      margin-top: 0 !important;
      padding-top: 0 !important;
    }

    .jspsych-bart-balloon-container {
      margin-top: 0 !important;
      padding-top: 0 !important;
    }

    .jspsych-bart-score-box,
    .jspsych-bart-info-box,
    .jspsych-bart-points-box {
      font-size: 15px !important;
      padding: 8px !important;
      margin: 6px !important;
    }

    @media (max-width: 768px) {
      .jspsych-content {
        padding: 8px 10px 10px 10px;
      }

      h2 {
        font-size: 21px;
      }

      p, li {
        font-size: 15px;
        line-height: 1.3;
      }

      .jspsych-btn {
        width: 100% !important;
        font-size: 16px !important;
        padding: 12px !important;
        margin: 6px 0 !important;
      }
    }

    @media (max-width: 480px) {
      .jspsych-content {
        padding: 6px 8px 8px 8px;
      }

      h2 {
        font-size: 19px;
      }

      p, li {
        font-size: 14px;
        line-height: 1.25;
      }

      .jspsych-btn {
        width: 100% !important;
        font-size: 16px !important;
        padding: 12px !important;
        margin: 5px 0 !important;
      }
    }
  </style>
</head>
<body></body>

<script>
  const jsPsych = initJsPsych({});
  const timeline = [];

  const screenWidth = window.innerWidth;
  const screenHeight = window.innerHeight;

  let startSize = 0.32;
  let sizeIncrement = 0.04;
  let maxWidth = "900px";

  // Réglages plus compacts selon écran
  if (screenWidth <= 480) {
    startSize = 0.18;
    sizeIncrement = 0.025;
    maxWidth = "100%";
  } else if (screenWidth <= 768) {
    startSize = 0.22;
    sizeIncrement = 0.03;
    maxWidth = "100%";
  } else if (screenWidth <= 1024) {
    startSize = 0.26;
    sizeIncrement = 0.035;
    maxWidth = "95%";
  }

  // Si écran peu haut, on compacte encore un peu
  if (screenHeight < 750) {
    startSize = Math.max(0.16, startSize - 0.03);
    sizeIncrement = Math.max(0.02, sizeIncrement - 0.005);
  }

  document.addEventListener("DOMContentLoaded", function() {
    const content = document.querySelector(".jspsych-content");
    if (content) {
      content.style.maxWidth = maxWidth;
    }
  });

  const instructions = {
    type: jsPsychInstructions,
    pages: [
      `
      <h2>Tâche des ballons</h2>
      <p>Dans cette tâche, tu verras plusieurs ballons.</p>
      <p>À chaque ballon, tu peux :</p>
      <ul>
        <li><strong>Gonfler</strong> : gonfler le ballon et gagner des points</li>
        <li><strong>Encaisser</strong> : sécuriser les points du ballon actuel</li>
      </ul>
      <p>Attention : si le ballon éclate, tu perds les points de ce ballon.</p>
      <p>Essaie de gagner le plus de points possible.</p>
      `,
      `
      <p>Le risque d’explosion n’est pas visible.</p>
      <p>Chaque ballon peut éclater à un moment différent.</p>
      <p>Clique sur <strong>Suivant</strong> pour commencer.</p>
      `
    ],
    show_clickable_nav: true,
    button_label_next: "Suivant",
    button_label_previous: "Retour"
  };

  timeline.push(instructions);

  const N_BALLOONS = 10;
  let totalPoints = 0;

  function generatePopThreshold() {
    return Math.floor(Math.random() * 64) + 1;
  }

  for (let i = 0; i < N_BALLOONS; i++) {
    timeline.push({
      type: jsPsychBart,
      pop_threshold: generatePopThreshold(),
      starting_total_points: function() {
        return totalPoints;
      },
      points_per_pump: 1,
      balloon_color: "#e74c3c",
      balloon_starting_size: startSize,
      balloon_size_increment: sizeIncrement,
      show_balloon_value: true,
      show_total_points: true,
      pump_button_label: "Gonfler",
      collect_button_label: "Encaisser",
      data: {
        task: "bart",
        balloon_number: i + 1,
        screen_width: window.innerWidth,
        screen_height: window.innerHeight,
        user_agent: navigator.userAgent
      },
      on_finish: function(data) {
        totalPoints = data.total_points;
      }
    });
  }

  const end_screen = {
    type: jsPsychHtmlButtonResponse,
    stimulus: function() {
      const data = jsPsych.data.get().filter({ task: "bart" }).values();

      let totalPumps = 0;
      let explosions = 0;

      data.forEach(d => {
        totalPumps += d.pumps;
        if (d.popped) explosions++;
      });

      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
        ? "mobile"
        : "ordinateur";

      end_screen.results = {
        type: "bartComplete",
        pumps: totalPumps,
        explosions: explosions,
        score: totalPoints,
        device: isMobile,
        screenwidth: window.innerWidth
      };

      return "<h2>Fin de la tâche</h2>" +
             "<p>Score final : <strong>" + totalPoints + "</strong></p>" +
             "<p>Clique sur le bouton ci-dessous pour continuer.</p>";
    },
    choices: ["Continuer"],
    on_finish: function() {
      window.parent.postMessage(end_screen.results, "*");
    }
  };

  timeline.push(end_screen);

  jsPsych.run(timeline);
</script>
</html>
